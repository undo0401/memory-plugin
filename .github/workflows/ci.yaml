name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: memory-plugin-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Compile plugin files
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import pathlib
          import py_compile

          for path in sorted(pathlib.Path('.').rglob('*.py')):
              if '__pycache__' in path.parts:
                  continue
              py_compile.compile(str(path), doraise=True)
              print(path)
          PY

      - name: Verify plugin metadata
        run: |
          test -f plugin.yaml
          test -f dashboard/manifest.json

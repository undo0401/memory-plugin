name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: memory-plugin-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Compile plugin files
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import pathlib
          import py_compile

          for path in sorted(pathlib.Path('.').rglob('*.py')):
              if '__pycache__' in path.parts:
                  continue
              py_compile.compile(str(path), doraise=True)
              print(path)
          PY

      - name: Verify plugin metadata
        run: |
          test -f plugin.yaml
          test -f dashboard/manifest.json
          test -f skills/daily-memory/SKILL.md

  sync-runtime:
    name: Deploy runtime checkout
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: [self-hosted, linux]
    concurrency:
      group: memory-plugin-sync-runtime
      cancel-in-progress: true

    steps:
      - name: Sync runtime checkout to origin/main
        env:
          RUNTIME_ROOT: /opt/data/plugins/memory
          REPO_SSH_URL: git@github-undo0401:undo0401/memory-plugin.git
          GIT_SSH_COMMAND: ssh -F /opt/data/home/.ssh/config -o StrictHostKeyChecking=accept-new
          TARGET_REF: origin/main
          TARGET_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import shutil
          import subprocess
          import tempfile
          from datetime import datetime, timezone
          from pathlib import Path

          dst = Path(os.environ['RUNTIME_ROOT'])
          repo_url = os.environ['REPO_SSH_URL']
          target_ref = os.environ['TARGET_REF']
          target_sha = os.environ['TARGET_SHA']
          git_ssh_command = os.environ['GIT_SSH_COMMAND']
          env = os.environ.copy()
          env['GIT_SSH_COMMAND'] = git_ssh_command

          preserve_dirs = ['state']
          preserve_files = ['deploy-metadata.json']

          def copy_preserved(src_root: Path, tmp_root: Path):
              for name in preserve_dirs:
                  src = src_root / name
                  if src.exists():
                      shutil.copytree(src, tmp_root / name, dirs_exist_ok=True)
              for name in preserve_files:
                  src = src_root / name
                  if src.is_file():
                      target = tmp_root / name
                      target.parent.mkdir(parents=True, exist_ok=True)
                      shutil.copy2(src, target)

          dst.parent.mkdir(parents=True, exist_ok=True)
          tmp_root = Path(tempfile.mkdtemp())
          try:
              if dst.exists() and not (dst / '.git').exists():
                  copy_preserved(dst, tmp_root)
                  shutil.rmtree(dst)
                  subprocess.run(['git', 'clone', '--branch', 'main', repo_url, str(dst)], check=True, env=env)
                  copy_preserved(tmp_root, dst)
              elif not dst.exists():
                  subprocess.run(['git', 'clone', '--branch', 'main', repo_url, str(dst)], check=True, env=env)

              tmp_preserve = Path(tempfile.mkdtemp())
              try:
                  copy_preserved(dst, tmp_preserve)
                  subprocess.run(['git', '-C', str(dst), 'config', 'core.sshCommand', git_ssh_command], check=True, env=env)
                  subprocess.run(['git', '-C', str(dst), 'remote', 'set-url', 'origin', repo_url], check=True, env=env)
                  subprocess.run(['git', '-C', str(dst), 'fetch', '--prune', 'origin'], check=True, env=env)
                  subprocess.run(['git', '-C', str(dst), 'reset', '--hard', target_ref], check=True, env=env)
                  subprocess.run(['git', '-C', str(dst), 'clean', '-fd'], check=True, env=env)
                  copy_preserved(tmp_preserve, dst)
              finally:
                  shutil.rmtree(tmp_preserve, ignore_errors=True)

              metadata = {
                  'environment': 'plugin-runtime',
                  'mode': 'git-checkout',
                  'source_remote': repo_url,
                  'source_branch': 'main',
                  'source_sha': target_sha,
                  'deployed_at_utc': datetime.now(timezone.utc).isoformat(),
              }
              (dst / 'deploy-metadata.json').write_text(json.dumps(metadata, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          finally:
              shutil.rmtree(tmp_root, ignore_errors=True)
          PY

      - name: Verify runtime checkout
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import pathlib
          import py_compile
          import subprocess

          root = pathlib.Path('/opt/data/plugins/memory')
          assert (root / '.git').is_dir()
          for path in sorted(root.rglob('*.py')):
              if '__pycache__' in path.parts:
                  continue
              py_compile.compile(str(path), doraise=True)
              print(path)
          assert (root / 'plugin.yaml').is_file()
          assert (root / 'dashboard' / 'manifest.json').is_file()
          assert (root / 'skills' / 'daily-memory' / 'SKILL.md').is_file()
          subprocess.run(['git', '-C', str(root), 'rev-parse', 'HEAD'], check=True)
          PY

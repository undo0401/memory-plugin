name: memory
version: 0.1.28
description: Hermes plugin for memory runtime assets and dashboard hooks and a qualified technical registry; consumes configured snapshots without owning diary skills or producers.
author: LIN
runtime_hook:
  enabled: true
  protocol: hermes-runtime-hook-v1
  events:
    - gateway:startup
  module: runtime.py
  patch_gateway_runner: true
  event_handler: handle_hook_event
